<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPS Game</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050b11; }
    #game-container { display: block; width: 100%; height: 100%; }

    /* Crosshair overlay */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 10;
      width: 24px; height: 24px; display: none;
      filter: drop-shadow(0 0 4px rgba(62,220,255,.75));
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(220,250,255,0.95);
    }
    #crosshair::before { width: 2px; height: 8px; left: 50%; top: 0; transform: translateX(-50%); box-shadow: 0 16px 0 rgba(220,250,255,.95); }
    #crosshair::after  { height: 2px; width: 8px; top: 50%; left: 0; transform: translateY(-50%); box-shadow: 16px 0 0 rgba(220,250,255,.95); }

    body.locked #crosshair { display: block; }

    /* Ammo counter HUD */
    #ammo-hud {
      position: fixed; bottom: 20px; right: 20px;
      color: #fff; font-family: monospace; font-size: 24px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      pointer-events: none; z-index: 20;
      padding: 10px 15px; border: 1px solid rgba(80,210,255,.35);
      background: linear-gradient(135deg, rgba(5,15,23,.82), rgba(15,48,60,.55));
      border-radius: 4px; box-shadow: inset 3px 0 #ff8b28, 0 8px 24px rgba(0,0,0,.25);
    }

    /* Health bar HUD */
    #health-hud {
      position: fixed; top: 20px; left: 20px;
      color: #fff; font-family: monospace; z-index: 20;
      pointer-events: none;
      padding: 10px 14px; background: rgba(5,15,23,.68);
      border-left: 3px solid #38cdeb; border-radius: 4px;
    }
    #hearts-display {
      font-size: 28px;
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    .heart-filled { color: #ff3333; text-shadow: 0 0 6px rgba(255,0,0,0.6); }
    .heart-empty { color: #444; }
    #health-bar {
      width: 200px;
      height: 10px;
      background: #333;
      border: 2px solid #555;
      border-radius: 5px;
      overflow: hidden;
      transition: box-shadow 0.05s ease-out;
    }
    #health-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff3333, #ff6666);
      border-radius: 3px;
      transition: width 0.2s ease-out;
    }

    /* Wave counter HUD */
    #wave-hud {
      position: fixed; top: 20px; right: 20px;
      color: #fff; font-family: monospace; font-size: 18px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
      pointer-events: none; z-index: 20;
      padding: 10px 14px; background: rgba(5,15,23,.68);
      border-bottom: 2px solid rgba(56,205,235,.7); letter-spacing: 1px;
    }

    /* Game state overlays — CSS-only, shown/hidden by class */
    .game-overlay {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    .game-overlay.active {
      display: flex;
      pointer-events: auto;
    }

    /* Start screen */
    #start-screen {
      background: radial-gradient(circle at center, rgba(20,72,86,.75), rgba(2,7,12,.96) 70%);
      color: #fff;
    }
    #start-screen h1 {
      font-family: monospace; font-size: 64px;
      letter-spacing: 8px; margin-bottom: 30px;
      text-shadow: 0 0 28px rgba(54,208,239,.65);
    }
    #start-screen .instruction {
      font-family: monospace; font-size: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    #start-screen .controls { margin-top: 22px; color: #9ec3cc; font: 14px/1.7 monospace; letter-spacing: 1px; }

    #damage-overlay {
      position: fixed; inset: 0; z-index: 30; pointer-events: none; opacity: 0;
      background: radial-gradient(circle, transparent 35%, rgba(255,20,35,.78) 115%);
      transition: opacity .28s ease-out;
    }
    #damage-overlay.active { opacity: 1; transition: opacity .025s; }

    /* Game over screen */
    #game-over-screen {
      background: rgba(180, 0, 0, 0.75);
      color: #fff;
    }
    #game-over-screen h1 {
      font-family: monospace; font-size: 72px;
      letter-spacing: 6px; margin-bottom: 30px;
      text-shadow: 0 0 30px rgba(255,0,0,0.8);
    }

    /* Victory screen */
    #victory-screen {
      background: rgba(0, 120, 0, 0.75);
      color: #fff;
    }
    #victory-screen h1 {
      font-family: monospace; font-size: 72px;
      letter-spacing: 6px; margin-bottom: 30px;
      text-shadow: 0 0 30px rgba(0,255,0,0.8);
    }

    /* Restart button (shared across game over and victory) */
    .restart-btn {
      font-family: monospace; font-size: 24px;
      padding: 12px 36px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .restart-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="crosshair"></div>
  <div id="damage-overlay"></div>

  <!-- Health HUD -->
  <div id="health-hud">
    <div id="hearts-display"></div>
    <div id="health-bar"><div id="health-bar-fill" style="width:100%"></div></div>
  </div>

  <!-- Wave counter HUD -->
  <div id="wave-hud">WAVE 1 / 10 — Enemies: 3</div>

  <!-- Ammo counter HUD -->
  <div id="ammo-hud">AMMO: 30/30</div>

  <!-- Start screen overlay -->
  <div id="start-screen" class="game-overlay active">
    <h1>NEON SIEGE</h1>
    <p class="instruction">Click to deploy</p>
    <p class="controls">WASD MOVE · SHIFT SPRINT · SPACE JUMP<br>MOUSE FIRE · R RELOAD · ESC PAUSE</p>
  </div>

  <!-- Game over overlay -->
  <div id="game-over-screen" class="game-overlay">
    <h1>GAME OVER</h1>
    <button class="restart-btn" id="restart-btn-gameover">Restart</button>
  </div>

  <!-- Victory overlay -->
  <div id="victory-screen" class="game-overlay">
    <h1>VICTORY!</h1>
    <p style="font-family:monospace;font-size:20px;margin-bottom:30px;">All waves survived</p>
    <button class="restart-btn" id="restart-btn-victory">Play Again</button>
  </div>

  <!-- Import map — Three.js r168 from jsdelivr CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
